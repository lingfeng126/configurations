# Basic Tmux Configuration
# ========================

# Set prefix to Ctrl+b (default)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Enable mouse mode
set -g mouse on

# Set default terminal mode to 256color
set -g default-terminal "screen-256color"

# Set window and pane index to 1 (0 is too far from keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display session name and window title in terminal title
set -g set-titles on
set -g set-titles-string "#T"

# Set easier window split keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload configuration file
bind r source-file ~/.tmux.conf \; display "Configuration reloaded!"

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-z 	resize-pane -Z
bind -n M-c 	new-window
bind -n M-[	previous-window
bind -n M-]	next-window


# Resize panes with Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle synchronize panes (send keys to all panes)
bind S setw synchronize-panes \; display "Synchronize panes: #{?synchronize-panes,ON,OFF}"

# Status bar configuration
set -g status-left-length 30
set -g status-left '#[fg=green](#S)#[fg=red]#{?synchronize-panes, SYNC,} '
set -g status-right-length 60
set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=white]%H:%M'

# Set window status format
setw -g window-status-format '#I:#W#F'
setw -g window-status-current-format '#[fg=yellow,bold]#I:#W#F'

# Enable vi mode
setw -g mode-keys vi

# Colors
set -g status-bg colour234
set -g status-fg colour15
